name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  verify:
    name: Verify before deployment
    uses: ./.github/workflows/pr-ci.yml

  deployment-disabled:
    name: Deployment disabled
    runs-on: ubuntu-latest
    needs: verify
    if: ${{ github.event_name != 'workflow_dispatch' && vars.DEPLOY_ENABLED != 'true' }}
    steps:
      - name: Explain disabled deployment
        run: |
          echo "DEPLOY_ENABLED is not true, so push-to-main deployment is disabled."
          echo "Set the repository variable DEPLOY_ENABLED=true after staging and production environments are configured."
          echo "Manual workflow_dispatch runs can still deploy when you intentionally start them."

  deploy-staging:
    name: Deploy staging
    runs-on: ubuntu-latest
    needs: verify
    if: ${{ github.event_name == 'workflow_dispatch' || vars.DEPLOY_ENABLED == 'true' }}
    environment:
      name: staging
      url: ${{ vars.BASE_URL }}
    steps:
      - name: Validate staging deployment configuration
        env:
          APP_DIR: ${{ secrets.APP_DIR }}
          GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          GCP_DEPLOY_SERVICE_ACCOUNT: ${{ secrets.GCP_DEPLOY_SERVICE_ACCOUNT }}
          GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          GCP_VM_NAME: ${{ vars.GCP_VM_NAME }}
          GCP_VM_ZONE: ${{ vars.GCP_VM_ZONE }}
        run: |
          set -euo pipefail
          for name in \
            APP_DIR \
            GCP_WORKLOAD_IDENTITY_PROVIDER \
            GCP_DEPLOY_SERVICE_ACCOUNT \
            GCP_PROJECT_ID \
            GCP_VM_NAME \
            GCP_VM_ZONE
          do
            value="${!name:-}"
            if [ -z "$value" ]; then
              echo "::error::$name is required in the staging environment"
              exit 1
            fi
          done

      - name: Checkout
        uses: actions/checkout@v6

      - name: Build staging images
        env:
          NEXT_PUBLIC_SITE_URL: ${{ vars.BASE_URL }}
          NEXT_PUBLIC_API_BASE_URL: /api
          COMPOSE_PROJECT_NAME: portfolio-staging
          RELEASE_IMAGE_ARCHIVE: /tmp/portfolio-staging-images.tar.gz
        run: |
          set -euo pipefail
          docker build \
            -f apps/web/Dockerfile \
            --build-arg NEXT_PUBLIC_SITE_URL="$NEXT_PUBLIC_SITE_URL" \
            --build-arg NEXT_PUBLIC_API_BASE_URL="$NEXT_PUBLIC_API_BASE_URL" \
            -t "${COMPOSE_PROJECT_NAME}-web:latest" \
            .
          docker build \
            -f apps/api/Dockerfile \
            -t "${COMPOSE_PROJECT_NAME}-api:latest" \
            .
          docker build \
            -f apps/mcp/Dockerfile \
            -t "${COMPOSE_PROJECT_NAME}-mcp:latest" \
            .
          docker save \
            "${COMPOSE_PROJECT_NAME}-web:latest" \
            "${COMPOSE_PROJECT_NAME}-api:latest" \
            "${COMPOSE_PROJECT_NAME}-mcp:latest" \
            | gzip > "$RELEASE_IMAGE_ARCHIVE"
          ls -lh "$RELEASE_IMAGE_ARCHIVE"

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOY_SERVICE_ACCOUNT }}

      - name: Setup Google Cloud CLI
        uses: google-github-actions/setup-gcloud@v3

      - name: Upload staging images through IAP
        env:
          GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          GCP_VM_NAME: ${{ vars.GCP_VM_NAME }}
          GCP_VM_ZONE: ${{ vars.GCP_VM_ZONE }}
          LOCAL_RELEASE_IMAGE_ARCHIVE: /tmp/portfolio-staging-images.tar.gz
          LOCAL_DEPLOY_SCRIPT: /tmp/portfolio-deploy-staging.sh
          REMOTE_RELEASE_IMAGE_ARCHIVE: /tmp/portfolio-staging-${{ github.sha }}.tar.gz
          REMOTE_DEPLOY_SCRIPT: /tmp/portfolio-deploy-staging-${{ github.sha }}.sh
        run: |
          set -euo pipefail
          cat > "$LOCAL_DEPLOY_SCRIPT" <<'SCRIPT'
          #!/usr/bin/env bash
          set -euo pipefail

          : "${APP_DIR:?APP_DIR is required}"
          : "${RELEASE_IMAGE_ARCHIVE:?RELEASE_IMAGE_ARCHIVE is required}"
          : "${DEPLOY_MODE:?DEPLOY_MODE is required}"
          : "${RUN_BACKUP:?RUN_BACKUP is required}"

          cleanup() {
            rm -f "$RELEASE_IMAGE_ARCHIVE" "$0"
          }
          trap cleanup EXIT

          chmod 0644 "$RELEASE_IMAGE_ARCHIVE"

          sudo -u portfolio env \
            APP_DIR="$APP_DIR" \
            RELEASE_IMAGE_ARCHIVE="$RELEASE_IMAGE_ARCHIVE" \
            DEPLOY_MODE="$DEPLOY_MODE" \
            RUN_BACKUP="$RUN_BACKUP" \
            bash <<'PORTFOLIO_DEPLOY'
          set -euo pipefail
          cd "$APP_DIR"
          git fetch origin main
          git checkout main
          git pull --ff-only origin main
          cd deploy/compose
          ./validate-env.sh "$DEPLOY_MODE" .env
          if [ "$RUN_BACKUP" = "true" ]; then
            ./backup-postgres.sh || true
          fi
          docker load -i "$RELEASE_IMAGE_ARCHIVE"
          docker compose --env-file .env -f compose.yml up -d --no-build
          docker compose --env-file .env -f compose.yml ps
          PORTFOLIO_DEPLOY
          SCRIPT

          gcloud compute scp \
            --project "$GCP_PROJECT_ID" \
            --zone "$GCP_VM_ZONE" \
            --tunnel-through-iap \
            --quiet \
            "$LOCAL_RELEASE_IMAGE_ARCHIVE" \
            "${GCP_VM_NAME}:${REMOTE_RELEASE_IMAGE_ARCHIVE}"

          gcloud compute scp \
            --project "$GCP_PROJECT_ID" \
            --zone "$GCP_VM_ZONE" \
            --tunnel-through-iap \
            --quiet \
            "$LOCAL_DEPLOY_SCRIPT" \
            "${GCP_VM_NAME}:${REMOTE_DEPLOY_SCRIPT}"

      - name: Deploy staging through IAP
        env:
          APP_DIR: ${{ secrets.APP_DIR }}
          GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          GCP_VM_NAME: ${{ vars.GCP_VM_NAME }}
          GCP_VM_ZONE: ${{ vars.GCP_VM_ZONE }}
          REMOTE_RELEASE_IMAGE_ARCHIVE: /tmp/portfolio-staging-${{ github.sha }}.tar.gz
          REMOTE_DEPLOY_SCRIPT: /tmp/portfolio-deploy-staging-${{ github.sha }}.sh
        run: |
          set -euo pipefail
          gcloud compute ssh "$GCP_VM_NAME" \
            --project "$GCP_PROJECT_ID" \
            --zone "$GCP_VM_ZONE" \
            --tunnel-through-iap \
            --quiet \
            --command "chmod +x '$REMOTE_DEPLOY_SCRIPT' && APP_DIR='$APP_DIR' RELEASE_IMAGE_ARCHIVE='$REMOTE_RELEASE_IMAGE_ARCHIVE' DEPLOY_MODE='staging' RUN_BACKUP='false' '$REMOTE_DEPLOY_SCRIPT'"

      - name: Open staging IAP tunnel
        env:
          GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          GCP_VM_NAME: ${{ vars.GCP_VM_NAME }}
          GCP_VM_ZONE: ${{ vars.GCP_VM_ZONE }}
          STAGING_TUNNEL_LOCAL_PORT: ${{ vars.STAGING_TUNNEL_LOCAL_PORT }}
          STAGING_TUNNEL_TARGET_HOST: ${{ vars.STAGING_TUNNEL_TARGET_HOST }}
          STAGING_TUNNEL_TARGET_PORT: ${{ vars.STAGING_TUNNEL_TARGET_PORT }}
        run: |
          set -euo pipefail
          local_port="${STAGING_TUNNEL_LOCAL_PORT:-3000}"
          target_host="${STAGING_TUNNEL_TARGET_HOST:-127.0.0.1}"
          target_port="${STAGING_TUNNEL_TARGET_PORT:-18080}"

          gcloud compute ssh "$GCP_VM_NAME" \
            --project "$GCP_PROJECT_ID" \
            --zone "$GCP_VM_ZONE" \
            --tunnel-through-iap \
            --quiet \
            -- -fN \
            -o ExitOnForwardFailure=yes \
            -o ServerAliveInterval=30 \
            -L "${local_port}:${target_host}:${target_port}"

          echo "STAGING_BASE_URL=http://127.0.0.1:${local_port}" >> "$GITHUB_ENV"

      - name: Staging smoke checks
        run: |
          set -euo pipefail
          curl -fsS "$STAGING_BASE_URL/api/healthz"
          status="$(curl -sS -o /dev/null -w '%{http_code}' "$STAGING_BASE_URL/mcp")"
          test "$status" = "401"

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx --workspace apps/web playwright install --with-deps chromium

      - name: Staging E2E tests
        run: E2E_BASE_URL="$STAGING_BASE_URL" npm run test:e2e

  terraform-plan:
    name: Terraform plan before production approval
    needs: verify
    if: ${{ github.event_name == 'workflow_dispatch' || vars.DEPLOY_ENABLED == 'true' }}
    uses: ./.github/workflows/terraform-plan.yml
    secrets: inherit

  approve-production:
    name: Await production approval
    runs-on: ubuntu-latest
    needs:
      - deploy-staging
      - terraform-plan
    environment:
      name: production
    steps:
      - name: Approval gate passed
        run: echo "Production environment approval granted."

  deploy-production:
    name: Deploy production
    runs-on: ubuntu-latest
    needs: approve-production
    environment:
      name: production
      url: ${{ vars.BASE_URL }}
    steps:
      - name: Validate production deployment configuration
        env:
          APP_DIR: ${{ secrets.APP_DIR }}
          GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          GCP_DEPLOY_SERVICE_ACCOUNT: ${{ secrets.GCP_DEPLOY_SERVICE_ACCOUNT }}
          GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          GCP_VM_NAME: ${{ vars.GCP_VM_NAME }}
          GCP_VM_ZONE: ${{ vars.GCP_VM_ZONE }}
        run: |
          set -euo pipefail
          for name in \
            APP_DIR \
            GCP_WORKLOAD_IDENTITY_PROVIDER \
            GCP_DEPLOY_SERVICE_ACCOUNT \
            GCP_PROJECT_ID \
            GCP_VM_NAME \
            GCP_VM_ZONE
          do
            value="${!name:-}"
            if [ -z "$value" ]; then
              echo "::error::$name is required in the production environment"
              exit 1
            fi
          done

      - name: Checkout
        uses: actions/checkout@v6

      - name: Build production images
        env:
          NEXT_PUBLIC_SITE_URL: ${{ vars.BASE_URL }}
          NEXT_PUBLIC_API_BASE_URL: /api
          COMPOSE_PROJECT_NAME: portfolio-production
          RELEASE_IMAGE_ARCHIVE: /tmp/portfolio-production-images.tar.gz
        run: |
          set -euo pipefail
          docker build \
            -f apps/web/Dockerfile \
            --build-arg NEXT_PUBLIC_SITE_URL="$NEXT_PUBLIC_SITE_URL" \
            --build-arg NEXT_PUBLIC_API_BASE_URL="$NEXT_PUBLIC_API_BASE_URL" \
            -t "${COMPOSE_PROJECT_NAME}-web:latest" \
            .
          docker build \
            -f apps/api/Dockerfile \
            -t "${COMPOSE_PROJECT_NAME}-api:latest" \
            .
          docker build \
            -f apps/mcp/Dockerfile \
            -t "${COMPOSE_PROJECT_NAME}-mcp:latest" \
            .
          docker save \
            "${COMPOSE_PROJECT_NAME}-web:latest" \
            "${COMPOSE_PROJECT_NAME}-api:latest" \
            "${COMPOSE_PROJECT_NAME}-mcp:latest" \
            | gzip > "$RELEASE_IMAGE_ARCHIVE"
          ls -lh "$RELEASE_IMAGE_ARCHIVE"

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOY_SERVICE_ACCOUNT }}

      - name: Setup Google Cloud CLI
        uses: google-github-actions/setup-gcloud@v3

      - name: Upload production images through IAP
        env:
          GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          GCP_VM_NAME: ${{ vars.GCP_VM_NAME }}
          GCP_VM_ZONE: ${{ vars.GCP_VM_ZONE }}
          LOCAL_RELEASE_IMAGE_ARCHIVE: /tmp/portfolio-production-images.tar.gz
          LOCAL_DEPLOY_SCRIPT: /tmp/portfolio-deploy-production.sh
          REMOTE_RELEASE_IMAGE_ARCHIVE: /tmp/portfolio-production-${{ github.sha }}.tar.gz
          REMOTE_DEPLOY_SCRIPT: /tmp/portfolio-deploy-production-${{ github.sha }}.sh
        run: |
          set -euo pipefail
          cat > "$LOCAL_DEPLOY_SCRIPT" <<'SCRIPT'
          #!/usr/bin/env bash
          set -euo pipefail

          : "${APP_DIR:?APP_DIR is required}"
          : "${RELEASE_IMAGE_ARCHIVE:?RELEASE_IMAGE_ARCHIVE is required}"
          : "${DEPLOY_MODE:?DEPLOY_MODE is required}"
          : "${RUN_BACKUP:?RUN_BACKUP is required}"

          cleanup() {
            rm -f "$RELEASE_IMAGE_ARCHIVE" "$0"
          }
          trap cleanup EXIT

          chmod 0644 "$RELEASE_IMAGE_ARCHIVE"

          sudo -u portfolio env \
            APP_DIR="$APP_DIR" \
            RELEASE_IMAGE_ARCHIVE="$RELEASE_IMAGE_ARCHIVE" \
            DEPLOY_MODE="$DEPLOY_MODE" \
            RUN_BACKUP="$RUN_BACKUP" \
            bash <<'PORTFOLIO_DEPLOY'
          set -euo pipefail
          cd "$APP_DIR"
          git fetch origin main
          git checkout main
          git pull --ff-only origin main
          cd deploy/compose
          ./validate-env.sh "$DEPLOY_MODE" .env
          if [ "$RUN_BACKUP" = "true" ]; then
            ./backup-postgres.sh || true
          fi
          docker load -i "$RELEASE_IMAGE_ARCHIVE"
          docker compose --env-file .env -f compose.yml up -d --no-build
          docker compose --env-file .env -f compose.yml ps
          PORTFOLIO_DEPLOY
          SCRIPT

          gcloud compute scp \
            --project "$GCP_PROJECT_ID" \
            --zone "$GCP_VM_ZONE" \
            --tunnel-through-iap \
            --quiet \
            "$LOCAL_RELEASE_IMAGE_ARCHIVE" \
            "${GCP_VM_NAME}:${REMOTE_RELEASE_IMAGE_ARCHIVE}"

          gcloud compute scp \
            --project "$GCP_PROJECT_ID" \
            --zone "$GCP_VM_ZONE" \
            --tunnel-through-iap \
            --quiet \
            "$LOCAL_DEPLOY_SCRIPT" \
            "${GCP_VM_NAME}:${REMOTE_DEPLOY_SCRIPT}"

      - name: Deploy production through IAP
        env:
          APP_DIR: ${{ secrets.APP_DIR }}
          GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          GCP_VM_NAME: ${{ vars.GCP_VM_NAME }}
          GCP_VM_ZONE: ${{ vars.GCP_VM_ZONE }}
          REMOTE_RELEASE_IMAGE_ARCHIVE: /tmp/portfolio-production-${{ github.sha }}.tar.gz
          REMOTE_DEPLOY_SCRIPT: /tmp/portfolio-deploy-production-${{ github.sha }}.sh
        run: |
          set -euo pipefail
          gcloud compute ssh "$GCP_VM_NAME" \
            --project "$GCP_PROJECT_ID" \
            --zone "$GCP_VM_ZONE" \
            --tunnel-through-iap \
            --quiet \
            --command "chmod +x '$REMOTE_DEPLOY_SCRIPT' && APP_DIR='$APP_DIR' RELEASE_IMAGE_ARCHIVE='$REMOTE_RELEASE_IMAGE_ARCHIVE' DEPLOY_MODE='production' RUN_BACKUP='true' '$REMOTE_DEPLOY_SCRIPT'"

      - name: Production smoke checks
        env:
          BASE_URL: ${{ vars.BASE_URL }}
        run: |
          set -euo pipefail
          curl -fsS "$BASE_URL/api/healthz"
          status="$(curl -sS -o /dev/null -w '%{http_code}' "$BASE_URL/mcp")"
          test "$status" = "401"
