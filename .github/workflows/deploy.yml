name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  changes:
    name: Detect deployment scope
    runs-on: ubuntu-latest
    outputs:
      app_changed: ${{ steps.detect.outputs.app_changed }}
      web_changed: ${{ steps.detect.outputs.web_changed }}
      api_changed: ${{ steps.detect.outputs.api_changed }}
      mcp_changed: ${{ steps.detect.outputs.mcp_changed }}
      database_changed: ${{ steps.detect.outputs.database_changed }}
      terraform_changed: ${{ steps.detect.outputs.terraform_changed }}
      deploy_changed: ${{ steps.detect.outputs.deploy_changed }}
      release_services: ${{ steps.detect.outputs.release_services }}
      verify_required: ${{ steps.detect.outputs.verify_required }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect changed areas
        id: detect
        run: |
          set -euo pipefail

          web=false
          api=false
          mcp=false
          database=false
          terraform=false
          deploy=false
          verify=false

          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
            web=true
            api=true
            mcp=true
            database=true
            terraform=true
            deploy=true
            verify=true
            printf '__manual_dispatch__\n' > changed-files.txt
          else
            base="${{ github.event.before }}"
            if [ -z "$base" ] || printf '%s' "$base" | grep -Eq '^0+$'; then
              base="$(git rev-parse HEAD^)"
            fi
            git diff --name-only "$base" "$GITHUB_SHA" > changed-files.txt

            while IFS= read -r path; do
              [ -n "$path" ] || continue
              case "$path" in
                apps/web/*|packages/*|package.json|package-lock.json|apps/web/Dockerfile)
                  web=true
                  verify=true
                  ;;
                apps/api/*|apps/api/Dockerfile)
                  api=true
                  verify=true
                  ;;
                apps/mcp/*|apps/mcp/Dockerfile)
                  mcp=true
                  verify=true
                  ;;
                db/*|scripts/test-migrations.*|compose.dev.yml)
                  api=true
                  mcp=true
                  database=true
                  verify=true
                  ;;
                deploy/compose/*|.dockerignore)
                  web=true
                  api=true
                  mcp=true
                  deploy=true
                  verify=true
                  ;;
                infra/gcp/*|.github/workflows/terraform-plan.yml)
                  terraform=true
                  verify=true
                  ;;
                .github/workflows/deploy.yml|.github/workflows/pr-ci.yml)
                  deploy=true
                  verify=true
                  ;;
              esac
            done < changed-files.txt
          fi

          services=""
          if [ "$web" = "true" ]; then services="${services:+$services }web"; fi
          if [ "$api" = "true" ]; then services="${services:+$services }api"; fi
          if [ "$mcp" = "true" ]; then services="${services:+$services }mcp"; fi

          app_changed=false
          if [ -n "$services" ]; then app_changed=true; fi

          {
            echo "app_changed=$app_changed"
            echo "web_changed=$web"
            echo "api_changed=$api"
            echo "mcp_changed=$mcp"
            echo "database_changed=$database"
            echo "terraform_changed=$terraform"
            echo "deploy_changed=$deploy"
            echo "release_services=$services"
            echo "verify_required=$verify"
          } >> "$GITHUB_OUTPUT"

          {
            echo "## Deployment Scope"
            echo
            echo "- App changed: \`$app_changed\`"
            echo "- Release services: \`${services:-none}\`"
            echo "- Database checks: \`$database\`"
            echo "- Terraform changed: \`$terraform\`"
            echo "- Deploy scripts/workflows changed: \`$deploy\`"
            echo "- Verify required: \`$verify\`"
            echo
            echo "Changed files:"
            echo '```text'
            cat changed-files.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  verify:
    name: Verify before deployment
    needs: changes
    if: ${{ needs.changes.outputs.verify_required == 'true' }}
    uses: ./.github/workflows/pr-ci.yml
    with:
      web_changed: ${{ needs.changes.outputs.web_changed == 'true' }}
      api_changed: ${{ needs.changes.outputs.api_changed == 'true' }}
      mcp_changed: ${{ needs.changes.outputs.mcp_changed == 'true' }}
      database_changed: ${{ needs.changes.outputs.database_changed == 'true' }}
      terraform_changed: ${{ needs.changes.outputs.terraform_changed == 'true' }}
      deploy_changed: ${{ needs.changes.outputs.deploy_changed == 'true' }}

  deployment-disabled:
    name: Deployment disabled
    runs-on: ubuntu-latest
    needs:
      - changes
      - verify
    if: ${{ always() && github.event_name != 'workflow_dispatch' && vars.DEPLOY_ENABLED != 'true' && needs.changes.outputs.app_changed == 'true' }}
    steps:
      - name: Explain disabled deployment
        run: |
          echo "DEPLOY_ENABLED is not true, so push-to-main deployment is disabled."
          echo "Set the repository variable DEPLOY_ENABLED=true after staging and production environments are configured."
          echo "Manual workflow_dispatch runs can still deploy when you intentionally start them."

  deployment-skipped:
    name: Deployment skipped
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.app_changed != 'true' && needs.changes.outputs.terraform_changed != 'true' }}
    steps:
      - name: Explain skipped deployment
        run: echo "No application or Terraform deployment-relevant files changed."

  deploy-staging:
    name: Deploy staging
    runs-on: ubuntu-latest
    needs:
      - changes
      - verify
    if: ${{ always() && (github.event_name == 'workflow_dispatch' || vars.DEPLOY_ENABLED == 'true') && needs.changes.outputs.app_changed == 'true' && needs.verify.result == 'success' }}
    environment:
      name: staging
      url: ${{ vars.BASE_URL }}
    steps:
      - name: Validate staging deployment configuration
        env:
          APP_DIR: ${{ secrets.APP_DIR }}
          GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          GCP_DEPLOY_SERVICE_ACCOUNT: ${{ secrets.GCP_DEPLOY_SERVICE_ACCOUNT }}
          GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          GCP_VM_NAME: ${{ vars.GCP_VM_NAME }}
          GCP_VM_ZONE: ${{ vars.GCP_VM_ZONE }}
          RELEASE_SERVICES: ${{ needs.changes.outputs.release_services }}
        run: |
          set -euo pipefail
          for name in \
            APP_DIR \
            GCP_WORKLOAD_IDENTITY_PROVIDER \
            GCP_DEPLOY_SERVICE_ACCOUNT \
            GCP_PROJECT_ID \
            GCP_VM_NAME \
            GCP_VM_ZONE \
            RELEASE_SERVICES
          do
            value="${!name:-}"
            if [ -z "$value" ]; then
              echo "::error::$name is required in the staging environment"
              exit 1
            fi
          done

      - name: Checkout
        uses: actions/checkout@v6

      - name: Build staging images
        env:
          NEXT_PUBLIC_SITE_URL: ${{ vars.BASE_URL }}
          NEXT_PUBLIC_API_BASE_URL: /api
          COMPOSE_PROJECT_NAME: portfolio-staging
          RELEASE_IMAGE_ARCHIVE: /tmp/portfolio-staging-images.tar.gz
          RELEASE_SERVICES: ${{ needs.changes.outputs.release_services }}
        run: |
          set -euo pipefail
          archive_images=()

          for service in $RELEASE_SERVICES; do
            case "$service" in
              web)
                docker build \
                  -f apps/web/Dockerfile \
                  --label org.opencontainers.image.revision="$GITHUB_SHA" \
                  --build-arg NEXT_PUBLIC_SITE_URL="$NEXT_PUBLIC_SITE_URL" \
                  --build-arg NEXT_PUBLIC_API_BASE_URL="$NEXT_PUBLIC_API_BASE_URL" \
                  -t "${COMPOSE_PROJECT_NAME}-web:latest" \
                  .
                ;;
              api)
                docker build \
                  -f apps/api/Dockerfile \
                  --label org.opencontainers.image.revision="$GITHUB_SHA" \
                  -t "${COMPOSE_PROJECT_NAME}-api:latest" \
                  .
                ;;
              mcp)
                docker build \
                  -f apps/mcp/Dockerfile \
                  --label org.opencontainers.image.revision="$GITHUB_SHA" \
                  -t "${COMPOSE_PROJECT_NAME}-mcp:latest" \
                  .
                ;;
              *)
                echo "::error::Unsupported release service '$service'"
                exit 1
                ;;
            esac
            archive_images+=("${COMPOSE_PROJECT_NAME}-${service}:latest")
          done

          for image in "${archive_images[@]}"; do
            docker image inspect "$image" \
              --format "$image {{.ID}} revision={{ index .Config.Labels \"org.opencontainers.image.revision\" }}"
          done
          docker save "${archive_images[@]}" | gzip > "$RELEASE_IMAGE_ARCHIVE"
          ls -lh "$RELEASE_IMAGE_ARCHIVE"

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOY_SERVICE_ACCOUNT }}

      - name: Setup Google Cloud CLI
        uses: google-github-actions/setup-gcloud@v3

      - name: Upload staging images through IAP
        env:
          GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          GCP_VM_NAME: ${{ vars.GCP_VM_NAME }}
          GCP_VM_ZONE: ${{ vars.GCP_VM_ZONE }}
          LOCAL_RELEASE_IMAGE_ARCHIVE: /tmp/portfolio-staging-images.tar.gz
          LOCAL_DEPLOY_SCRIPT: deploy/compose/deploy-release.sh
          REMOTE_RELEASE_IMAGE_ARCHIVE: /tmp/portfolio-staging-${{ github.sha }}.tar.gz
          REMOTE_DEPLOY_SCRIPT: /tmp/portfolio-deploy-staging-${{ github.sha }}.sh
        run: |
          set -euo pipefail
          test -s "$LOCAL_DEPLOY_SCRIPT"

          gcloud compute scp \
            --project "$GCP_PROJECT_ID" \
            --zone "$GCP_VM_ZONE" \
            --tunnel-through-iap \
            --quiet \
            "$LOCAL_RELEASE_IMAGE_ARCHIVE" \
            "${GCP_VM_NAME}:${REMOTE_RELEASE_IMAGE_ARCHIVE}"

          gcloud compute scp \
            --project "$GCP_PROJECT_ID" \
            --zone "$GCP_VM_ZONE" \
            --tunnel-through-iap \
            --quiet \
            "$LOCAL_DEPLOY_SCRIPT" \
            "${GCP_VM_NAME}:${REMOTE_DEPLOY_SCRIPT}"

      - name: Deploy staging through IAP
        env:
          APP_DIR: ${{ secrets.APP_DIR }}
          GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          GCP_VM_NAME: ${{ vars.GCP_VM_NAME }}
          GCP_VM_ZONE: ${{ vars.GCP_VM_ZONE }}
          REMOTE_RELEASE_IMAGE_ARCHIVE: /tmp/portfolio-staging-${{ github.sha }}.tar.gz
          REMOTE_DEPLOY_SCRIPT: /tmp/portfolio-deploy-staging-${{ github.sha }}.sh
          RELEASE_SERVICES: ${{ needs.changes.outputs.release_services }}
        run: |
          set -euo pipefail
          gcloud compute ssh "$GCP_VM_NAME" \
            --project "$GCP_PROJECT_ID" \
            --zone "$GCP_VM_ZONE" \
            --tunnel-through-iap \
            --quiet \
            --command "APP_DIR='$APP_DIR' RELEASE_IMAGE_ARCHIVE='$REMOTE_RELEASE_IMAGE_ARCHIVE' DEPLOY_MODE='staging' RUN_BACKUP='false' EXPECTED_IMAGE_REVISION='$GITHUB_SHA' RELEASE_SERVICES='$RELEASE_SERVICES' bash '$REMOTE_DEPLOY_SCRIPT'"

      - name: Open staging IAP tunnel
        env:
          GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          GCP_VM_NAME: ${{ vars.GCP_VM_NAME }}
          GCP_VM_ZONE: ${{ vars.GCP_VM_ZONE }}
          STAGING_TUNNEL_LOCAL_PORT: ${{ vars.STAGING_TUNNEL_LOCAL_PORT }}
          STAGING_TUNNEL_TARGET_HOST: ${{ vars.STAGING_TUNNEL_TARGET_HOST }}
          STAGING_TUNNEL_TARGET_PORT: ${{ vars.STAGING_TUNNEL_TARGET_PORT }}
        run: |
          set -euo pipefail
          local_port="${STAGING_TUNNEL_LOCAL_PORT:-3000}"
          target_host="${STAGING_TUNNEL_TARGET_HOST:-127.0.0.1}"
          target_port="${STAGING_TUNNEL_TARGET_PORT:-18080}"

          gcloud compute ssh "$GCP_VM_NAME" \
            --project "$GCP_PROJECT_ID" \
            --zone "$GCP_VM_ZONE" \
            --tunnel-through-iap \
            --quiet \
            -- -fN \
            -o ExitOnForwardFailure=yes \
            -o ServerAliveInterval=30 \
            -L "${local_port}:${target_host}:${target_port}"

          echo "STAGING_BASE_URL=http://127.0.0.1:${local_port}" >> "$GITHUB_ENV"

      - name: Staging smoke checks
        run: |
          set -euo pipefail
          curl -fsS "$STAGING_BASE_URL/api/healthz"
          status="$(curl -sS -o /dev/null -w '%{http_code}' "$STAGING_BASE_URL/mcp")"
          test "$status" = "401"

      - name: Create staging admin E2E session
        env:
          APP_DIR: ${{ secrets.APP_DIR }}
          GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          GCP_VM_NAME: ${{ vars.GCP_VM_NAME }}
          GCP_VM_ZONE: ${{ vars.GCP_VM_ZONE }}
        run: |
          set -euo pipefail
          token="$(openssl rand -hex 32)"
          token_hash="$(printf '%s' "$token" | sha256sum | awk '{print $1}')"
          echo "::add-mask::$token"
          echo "E2E_ADMIN_SESSION_TOKEN=$token" >> "$GITHUB_ENV"

          sql="WITH inserted AS (INSERT INTO sessions (user_id, token_hash, expires_at) SELECT id, '$token_hash', now() + interval '2 hours' FROM users WHERE role = 'admin' ORDER BY created_at LIMIT 1 RETURNING 1) SELECT count(*) FROM inserted;"
          remote_command=$(cat <<EOF
          set -euo pipefail
          cd "$APP_DIR/deploy/compose"
          inserted=\$(sudo -u portfolio docker compose --env-file .env -f compose.yml exec -T postgres psql -U portfolio -d portfolio -tAc "$sql")
          test "\$(echo "\$inserted" | tr -d '[:space:]')" = "1"
          EOF
          )

          gcloud compute ssh "$GCP_VM_NAME" \
            --project "$GCP_PROJECT_ID" \
            --zone "$GCP_VM_ZONE" \
            --tunnel-through-iap \
            --quiet \
            --command "$remote_command"

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx --workspace apps/web playwright install --with-deps chromium

      - name: Staging E2E tests
        run: E2E_BASE_URL="$STAGING_BASE_URL" npm run test:e2e

  terraform-plan:
    name: Terraform plan before production deploy
    needs:
      - changes
      - verify
    if: ${{ always() && (github.event_name == 'workflow_dispatch' || vars.DEPLOY_ENABLED == 'true') && needs.changes.outputs.terraform_changed == 'true' && (needs.verify.result == 'success' || needs.verify.result == 'skipped') }}
    uses: ./.github/workflows/terraform-plan.yml
    secrets: inherit

  deploy-production:
    name: Deploy production
    runs-on: ubuntu-latest
    needs:
      - changes
      - deploy-staging
      - terraform-plan
    if: ${{ always() && (github.event_name == 'workflow_dispatch' || vars.DEPLOY_ENABLED == 'true') && needs.changes.outputs.app_changed == 'true' && needs['deploy-staging'].result == 'success' && (needs['terraform-plan'].result == 'success' || needs['terraform-plan'].result == 'skipped') }}
    environment:
      name: production
      url: ${{ vars.BASE_URL }}
    steps:
      - name: Validate production deployment configuration
        env:
          APP_DIR: ${{ secrets.APP_DIR }}
          GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          GCP_DEPLOY_SERVICE_ACCOUNT: ${{ secrets.GCP_DEPLOY_SERVICE_ACCOUNT }}
          GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          GCP_VM_NAME: ${{ vars.GCP_VM_NAME }}
          GCP_VM_ZONE: ${{ vars.GCP_VM_ZONE }}
          RELEASE_SERVICES: ${{ needs.changes.outputs.release_services }}
        run: |
          set -euo pipefail
          for name in \
            APP_DIR \
            GCP_WORKLOAD_IDENTITY_PROVIDER \
            GCP_DEPLOY_SERVICE_ACCOUNT \
            GCP_PROJECT_ID \
            GCP_VM_NAME \
            GCP_VM_ZONE \
            RELEASE_SERVICES
          do
            value="${!name:-}"
            if [ -z "$value" ]; then
              echo "::error::$name is required in the production environment"
              exit 1
            fi
          done

      - name: Checkout
        uses: actions/checkout@v6

      - name: Build production images
        env:
          NEXT_PUBLIC_SITE_URL: ${{ vars.BASE_URL }}
          NEXT_PUBLIC_API_BASE_URL: /api
          COMPOSE_PROJECT_NAME: portfolio-production
          RELEASE_IMAGE_ARCHIVE: /tmp/portfolio-production-images.tar.gz
          RELEASE_SERVICES: ${{ needs.changes.outputs.release_services }}
        run: |
          set -euo pipefail
          archive_images=()

          for service in $RELEASE_SERVICES; do
            case "$service" in
              web)
                docker build \
                  -f apps/web/Dockerfile \
                  --label org.opencontainers.image.revision="$GITHUB_SHA" \
                  --build-arg NEXT_PUBLIC_SITE_URL="$NEXT_PUBLIC_SITE_URL" \
                  --build-arg NEXT_PUBLIC_API_BASE_URL="$NEXT_PUBLIC_API_BASE_URL" \
                  -t "${COMPOSE_PROJECT_NAME}-web:latest" \
                  .
                ;;
              api)
                docker build \
                  -f apps/api/Dockerfile \
                  --label org.opencontainers.image.revision="$GITHUB_SHA" \
                  -t "${COMPOSE_PROJECT_NAME}-api:latest" \
                  .
                ;;
              mcp)
                docker build \
                  -f apps/mcp/Dockerfile \
                  --label org.opencontainers.image.revision="$GITHUB_SHA" \
                  -t "${COMPOSE_PROJECT_NAME}-mcp:latest" \
                  .
                ;;
              *)
                echo "::error::Unsupported release service '$service'"
                exit 1
                ;;
            esac
            archive_images+=("${COMPOSE_PROJECT_NAME}-${service}:latest")
          done

          for image in "${archive_images[@]}"; do
            docker image inspect "$image" \
              --format "$image {{.ID}} revision={{ index .Config.Labels \"org.opencontainers.image.revision\" }}"
          done
          docker save "${archive_images[@]}" | gzip > "$RELEASE_IMAGE_ARCHIVE"
          ls -lh "$RELEASE_IMAGE_ARCHIVE"

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOY_SERVICE_ACCOUNT }}

      - name: Setup Google Cloud CLI
        uses: google-github-actions/setup-gcloud@v3

      - name: Upload production images through IAP
        env:
          GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          GCP_VM_NAME: ${{ vars.GCP_VM_NAME }}
          GCP_VM_ZONE: ${{ vars.GCP_VM_ZONE }}
          LOCAL_RELEASE_IMAGE_ARCHIVE: /tmp/portfolio-production-images.tar.gz
          LOCAL_DEPLOY_SCRIPT: deploy/compose/deploy-release.sh
          REMOTE_RELEASE_IMAGE_ARCHIVE: /tmp/portfolio-production-${{ github.sha }}.tar.gz
          REMOTE_DEPLOY_SCRIPT: /tmp/portfolio-deploy-production-${{ github.sha }}.sh
        run: |
          set -euo pipefail
          test -s "$LOCAL_DEPLOY_SCRIPT"

          gcloud compute scp \
            --project "$GCP_PROJECT_ID" \
            --zone "$GCP_VM_ZONE" \
            --tunnel-through-iap \
            --quiet \
            "$LOCAL_RELEASE_IMAGE_ARCHIVE" \
            "${GCP_VM_NAME}:${REMOTE_RELEASE_IMAGE_ARCHIVE}"

          gcloud compute scp \
            --project "$GCP_PROJECT_ID" \
            --zone "$GCP_VM_ZONE" \
            --tunnel-through-iap \
            --quiet \
            "$LOCAL_DEPLOY_SCRIPT" \
            "${GCP_VM_NAME}:${REMOTE_DEPLOY_SCRIPT}"

      - name: Deploy production through IAP
        env:
          APP_DIR: ${{ secrets.APP_DIR }}
          GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          GCP_VM_NAME: ${{ vars.GCP_VM_NAME }}
          GCP_VM_ZONE: ${{ vars.GCP_VM_ZONE }}
          REMOTE_RELEASE_IMAGE_ARCHIVE: /tmp/portfolio-production-${{ github.sha }}.tar.gz
          REMOTE_DEPLOY_SCRIPT: /tmp/portfolio-deploy-production-${{ github.sha }}.sh
          RELEASE_SERVICES: ${{ needs.changes.outputs.release_services }}
        run: |
          set -euo pipefail
          gcloud compute ssh "$GCP_VM_NAME" \
            --project "$GCP_PROJECT_ID" \
            --zone "$GCP_VM_ZONE" \
            --tunnel-through-iap \
            --quiet \
            --command "APP_DIR='$APP_DIR' RELEASE_IMAGE_ARCHIVE='$REMOTE_RELEASE_IMAGE_ARCHIVE' DEPLOY_MODE='production' RUN_BACKUP='true' EXPECTED_IMAGE_REVISION='$GITHUB_SHA' RELEASE_SERVICES='$RELEASE_SERVICES' bash '$REMOTE_DEPLOY_SCRIPT'"

      - name: Open production IAP tunnel
        env:
          GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          GCP_VM_NAME: ${{ vars.GCP_VM_NAME }}
          GCP_VM_ZONE: ${{ vars.GCP_VM_ZONE }}
          PRODUCTION_TUNNEL_LOCAL_PORT: ${{ vars.PRODUCTION_TUNNEL_LOCAL_PORT }}
        run: |
          set -euo pipefail
          local_port="${PRODUCTION_TUNNEL_LOCAL_PORT:-3443}"

          gcloud compute ssh "$GCP_VM_NAME" \
            --project "$GCP_PROJECT_ID" \
            --zone "$GCP_VM_ZONE" \
            --tunnel-through-iap \
            --quiet \
            -- -fN \
            -o ExitOnForwardFailure=yes \
            -o ServerAliveInterval=30 \
            -L "${local_port}:127.0.0.1:443"

          echo "PRODUCTION_ORIGIN_LOCAL_PORT=${local_port}" >> "$GITHUB_ENV"

      - name: Production origin smoke checks
        env:
          BASE_URL: ${{ vars.BASE_URL }}
        run: |
          set -euo pipefail

          public_host="${BASE_URL#https://}"
          public_host="${public_host#http://}"
          public_host="${public_host%%/*}"
          public_host="${public_host%%:*}"

          curl_origin=(
            --connect-to "${public_host}:443:127.0.0.1:${PRODUCTION_ORIGIN_LOCAL_PORT}"
          )

          curl -fsS "${curl_origin[@]}" "https://${public_host}/api/healthz"
          status="$(curl -sS -o /dev/null -w '%{http_code}' "${curl_origin[@]}" "https://${public_host}/mcp")"
          test "$status" = "401"
