name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  verify:
    name: Verify before deployment
    uses: ./.github/workflows/pr-ci.yml

  deploy-staging:
    name: Deploy staging
    runs-on: ubuntu-latest
    needs: verify
    environment:
      name: staging
      url: ${{ vars.BASE_URL }}
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script_stop: true
          script: |
            set -euo pipefail
            cd "${{ secrets.APP_DIR }}"
            git fetch origin main
            git checkout main
            git pull --ff-only origin main
            cd deploy/compose
            ./validate-env.sh staging .env
            docker compose --env-file .env -f compose.yml up -d --build
            docker compose --env-file .env -f compose.yml ps

      - name: Open staging SSH tunnel
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_KNOWN_HOSTS: ${{ secrets.SSH_KNOWN_HOSTS }}
          STAGING_TUNNEL_LOCAL_PORT: ${{ vars.STAGING_TUNNEL_LOCAL_PORT }}
          STAGING_TUNNEL_TARGET_HOST: ${{ vars.STAGING_TUNNEL_TARGET_HOST }}
          STAGING_TUNNEL_TARGET_PORT: ${{ vars.STAGING_TUNNEL_TARGET_PORT }}
        run: |
          set -euo pipefail
          local_port="${STAGING_TUNNEL_LOCAL_PORT:-3000}"
          target_host="${STAGING_TUNNEL_TARGET_HOST:-127.0.0.1}"
          target_port="${STAGING_TUNNEL_TARGET_PORT:-18080}"

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          printf '%s\n' "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/deploy_key
          chmod 600 ~/.ssh/known_hosts

          ssh -fN \
            -i ~/.ssh/deploy_key \
            -p "$SSH_PORT" \
            -o ExitOnForwardFailure=yes \
            -o ServerAliveInterval=30 \
            -L "${local_port}:${target_host}:${target_port}" \
            "${SSH_USER}@${SSH_HOST}"

          echo "STAGING_BASE_URL=http://127.0.0.1:${local_port}" >> "$GITHUB_ENV"

      - name: Staging smoke checks
        run: |
          set -euo pipefail
          curl -fsS "$STAGING_BASE_URL/api/healthz"
          status="$(curl -sS -o /dev/null -w '%{http_code}' "$STAGING_BASE_URL/mcp")"
          test "$status" = "401"

      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx --workspace apps/web playwright install --with-deps chromium

      - name: Staging E2E tests
        run: E2E_BASE_URL="$STAGING_BASE_URL" npm run test:e2e

  approve-production:
    name: Await production approval
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment:
      name: production
    steps:
      - name: Approval gate passed
        run: echo "Production environment approval granted."

  deploy-production:
    name: Deploy production
    runs-on: ubuntu-latest
    needs: approve-production
    environment:
      name: production
      url: ${{ vars.BASE_URL }}
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script_stop: true
          script: |
            set -euo pipefail
            cd "${{ secrets.APP_DIR }}"
            git fetch origin main
            git checkout main
            git pull --ff-only origin main
            cd deploy/compose
            ./validate-env.sh production .env
            ./backup-postgres.sh || true
            docker compose --env-file .env -f compose.yml up -d --build
            docker compose --env-file .env -f compose.yml ps

      - name: Production smoke checks
        env:
          BASE_URL: ${{ vars.BASE_URL }}
        run: |
          set -euo pipefail
          curl -fsS "$BASE_URL/api/healthz"
          status="$(curl -sS -o /dev/null -w '%{http_code}' "$BASE_URL/mcp")"
          test "$status" = "401"
