name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  verify:
    name: Verify before deployment
    uses: ./.github/workflows/pr-ci.yml

  deploy-staging:
    name: Deploy staging
    runs-on: ubuntu-latest
    needs: verify
    environment:
      name: staging
      url: ${{ vars.BASE_URL }}
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script_stop: true
          script: |
            set -euo pipefail
            cd "${{ secrets.APP_DIR }}"
            git fetch origin main
            git checkout main
            git pull --ff-only origin main
            cd deploy/compose
            docker compose --env-file .env -f compose.yml up -d --build
            docker compose --env-file .env -f compose.yml ps

      - name: Staging smoke checks
        env:
          BASE_URL: ${{ vars.BASE_URL }}
        run: |
          set -euo pipefail
          curl -fsS "$BASE_URL/api/healthz"
          status="$(curl -sS -o /dev/null -w '%{http_code}' "$BASE_URL/mcp")"
          test "$status" = "401"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx --workspace apps/web playwright install --with-deps chromium

      - name: Staging E2E tests
        env:
          E2E_BASE_URL: ${{ vars.BASE_URL }}
        run: npm run test:e2e

  approve-production:
    name: Await production approval
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment:
      name: production
    steps:
      - name: Approval gate passed
        run: echo "Production environment approval granted."

  deploy-production:
    name: Deploy production
    runs-on: ubuntu-latest
    needs: approve-production
    environment:
      name: production
      url: ${{ vars.BASE_URL }}
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script_stop: true
          script: |
            set -euo pipefail
            cd "${{ secrets.APP_DIR }}"
            git fetch origin main
            git checkout main
            git pull --ff-only origin main
            cd deploy/compose
            ./backup-postgres.sh || true
            docker compose --env-file .env -f compose.yml up -d --build
            docker compose --env-file .env -f compose.yml ps

      - name: Production smoke checks
        env:
          BASE_URL: ${{ vars.BASE_URL }}
        run: |
          set -euo pipefail
          curl -fsS "$BASE_URL/api/healthz"
          status="$(curl -sS -o /dev/null -w '%{http_code}' "$BASE_URL/mcp")"
          test "$status" = "401"
