name: Pull Request CI

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:
  workflow_call:
    inputs:
      force_all:
        required: false
        type: boolean
        default: false
      web_changed:
        required: false
        type: boolean
        default: false
      api_changed:
        required: false
        type: boolean
        default: false
      mcp_changed:
        required: false
        type: boolean
        default: false
      database_changed:
        required: false
        type: boolean
        default: false
      terraform_changed:
        required: false
        type: boolean
        default: false
      deploy_changed:
        required: false
        type: boolean
        default: false

concurrency:
  group: pr-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  changes:
    name: Detect CI scope
    runs-on: ubuntu-latest
    outputs:
      web: ${{ steps.detect.outputs.web }}
      api: ${{ steps.detect.outputs.api }}
      mcp: ${{ steps.detect.outputs.mcp }}
      database: ${{ steps.detect.outputs.database }}
      terraform: ${{ steps.detect.outputs.terraform }}
      deploy: ${{ steps.detect.outputs.deploy }}
      any: ${{ steps.detect.outputs.any }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect changed areas
        id: detect
        env:
          INPUT_FORCE_ALL: ${{ inputs.force_all || false }}
          INPUT_WEB_CHANGED: ${{ inputs.web_changed || false }}
          INPUT_API_CHANGED: ${{ inputs.api_changed || false }}
          INPUT_MCP_CHANGED: ${{ inputs.mcp_changed || false }}
          INPUT_DATABASE_CHANGED: ${{ inputs.database_changed || false }}
          INPUT_TERRAFORM_CHANGED: ${{ inputs.terraform_changed || false }}
          INPUT_DEPLOY_CHANGED: ${{ inputs.deploy_changed || false }}
          HAS_PULL_REQUEST: ${{ github.event_name == 'pull_request' }}
        run: |
          set -euo pipefail

          web=false
          api=false
          mcp=false
          database=false
          terraform=false
          deploy=false

          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ] || [ "$INPUT_FORCE_ALL" = "true" ]; then
            web=true
            api=true
            mcp=true
            database=true
            terraform=true
            deploy=true
            printf '__manual_or_forced__\n' > changed-files.txt
          elif [ "$HAS_PULL_REQUEST" != "true" ]; then
            web="$INPUT_WEB_CHANGED"
            api="$INPUT_API_CHANGED"
            mcp="$INPUT_MCP_CHANGED"
            database="$INPUT_DATABASE_CHANGED"
            terraform="$INPUT_TERRAFORM_CHANGED"
            deploy="$INPUT_DEPLOY_CHANGED"
            printf '__workflow_call_inputs__\n' > changed-files.txt
          else
            base="${{ github.event.pull_request.base.sha }}"
            head="${{ github.event.pull_request.head.sha }}"
            git diff --name-only "$base" "$head" > changed-files.txt

            while IFS= read -r path; do
              [ -n "$path" ] || continue
              case "$path" in
                apps/web/*|packages/*|package.json|package-lock.json|apps/web/Dockerfile)
                  web=true
                  ;;
                apps/api/*|apps/api/Dockerfile)
                  api=true
                  ;;
                apps/mcp/*|apps/mcp/Dockerfile)
                  mcp=true
                  ;;
                db/*|scripts/test-migrations.*|compose.dev.yml)
                  database=true
                  ;;
                deploy/compose/*|.dockerignore)
                  deploy=true
                  ;;
                infra/gcp/*|.github/workflows/terraform-plan.yml)
                  terraform=true
                  ;;
                .github/workflows/deploy.yml|.github/workflows/pr-ci.yml)
                  deploy=true
                  ;;
              esac
            done < changed-files.txt
          fi

          any=false
          if [ "$web" = "true" ] || [ "$api" = "true" ] || [ "$mcp" = "true" ] || [ "$database" = "true" ] || [ "$terraform" = "true" ] || [ "$deploy" = "true" ]; then
            any=true
          fi

          {
            echo "web=$web"
            echo "api=$api"
            echo "mcp=$mcp"
            echo "database=$database"
            echo "terraform=$terraform"
            echo "deploy=$deploy"
            echo "any=$any"
          } >> "$GITHUB_OUTPUT"

          {
            echo "## CI Scope"
            echo
            echo "- Web: \`$web\`"
            echo "- API: \`$api\`"
            echo "- MCP: \`$mcp\`"
            echo "- Database integration: \`$database\`"
            echo "- Terraform: \`$terraform\`"
            echo "- Deploy scripts/workflows: \`$deploy\`"
            echo
            echo "Changed files:"
            echo '```text'
            cat changed-files.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  no-op:
    name: No relevant CI changes
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.any != 'true' }}
    steps:
      - name: Explain no-op
        run: echo "No files changed that require CI jobs."

  web:
    name: Web lint, test, build, E2E
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.web == 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck:web

      - name: Lint
        run: npm run lint:web

      - name: Unit tests
        run: npm run test:web

      - name: Build
        run: npm run build:web

      - name: Install Playwright Chromium
        run: npx --workspace apps/web playwright install --with-deps chromium

      - name: E2E smoke tests
        run: npm run test:e2e

  api:
    name: API tests and sqlc check
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.api == 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
          cache-dependency-path: apps/api/go.sum

      - name: API tests
        working-directory: apps/api
        run: go test ./...

      - name: Install sqlc
        run: go install github.com/sqlc-dev/sqlc/cmd/sqlc@v1.31.1

      - name: Verify generated sqlc code
        run: |
          sqlc generate
          git diff --exit-code -- apps/api/internal/db

  mcp:
    name: MCP tests
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.mcp == 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
          cache-dependency-path: apps/mcp/go.sum

      - name: MCP tests
        working-directory: apps/mcp
        run: go test ./...

  go:
    name: Go tests and sqlc check
    runs-on: ubuntu-latest
    needs:
      - changes
      - api
      - mcp
    if: ${{ always() && (needs.changes.outputs.api == 'true' || needs.changes.outputs.mcp == 'true') }}
    steps:
      - name: Check Go job results
        run: |
          set -euo pipefail
          if [ "${{ needs.api.result }}" = "failure" ] || [ "${{ needs.mcp.result }}" = "failure" ]; then
            echo "::error::One or more Go jobs failed."
            exit 1
          fi
          if [ "${{ needs.api.result }}" = "cancelled" ] || [ "${{ needs.mcp.result }}" = "cancelled" ]; then
            echo "::error::One or more Go jobs were cancelled."
            exit 1
          fi
          echo "Go job results: api=${{ needs.api.result }}, mcp=${{ needs.mcp.result }}"

  database:
    name: Migrations and DB integration
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.database == 'true' || needs.changes.outputs.api == 'true' || needs.changes.outputs.mcp == 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
          cache-dependency-path: |
            apps/api/go.sum
            apps/mcp/go.sum

      - name: Validate migration Up/Down
        if: ${{ needs.changes.outputs.database == 'true' }}
        run: bash scripts/test-migrations.sh

      - name: Start integration database
        run: |
          docker compose -f compose.dev.yml up -d postgres
          for i in {1..60}; do
            if docker compose -f compose.dev.yml exec -T postgres pg_isready -U portfolio -d portfolio; then
              exit 0
            fi
            sleep 1
          done
          exit 1

      - name: Apply schema
        run: |
          sed '/-- +goose Down/,$d' db/migrations/00001_initial_schema.sql |
            docker compose -f compose.dev.yml exec -T postgres psql -v ON_ERROR_STOP=1 -U portfolio -d portfolio

      - name: API integration tests
        if: ${{ needs.changes.outputs.database == 'true' || needs.changes.outputs.api == 'true' }}
        working-directory: apps/api
        env:
          API_INTEGRATION_DATABASE_URL: postgres://portfolio:portfolio@127.0.0.1:55432/portfolio?sslmode=disable
        run: go test ./internal/httpserver -run Integration -count=1

      - name: MCP integration tests
        if: ${{ needs.changes.outputs.database == 'true' || needs.changes.outputs.mcp == 'true' }}
        working-directory: apps/mcp
        env:
          MCP_INTEGRATION_DATABASE_URL: postgres://portfolio:portfolio@127.0.0.1:55432/portfolio?sslmode=disable
        run: go test ./internal/server -run Integration -count=1

      - name: Stop integration database
        if: always()
        run: docker compose -f compose.dev.yml down -v

  terraform:
    name: Terraform validation
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.terraform == 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.9.8"

      - name: Check formatting
        working-directory: infra/gcp
        run: terraform fmt -check -recursive

      - name: Initialize without backend
        working-directory: infra/gcp
        run: terraform init -backend=false

      - name: Validate configuration
        working-directory: infra/gcp
        run: terraform validate

  deploy:
    name: Deployment script validation
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.deploy == 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate shell scripts
        run: bash -n deploy/compose/*.sh
