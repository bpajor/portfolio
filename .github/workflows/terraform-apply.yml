name: Terraform Apply

on:
  workflow_dispatch:
  workflow_call:

concurrency:
  group: terraform-apply-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  approve:
    name: Approve Terraform apply
    runs-on: ubuntu-latest
    environment:
      name: production
    steps:
      - name: Approval gate
        run: |
          {
            echo "## Terraform Apply Approval"
            echo
            echo "This job exists only to require the protected production environment approval before Terraform changes are applied."
            echo "The apply job reads Terraform-specific vars and secrets from the terraform environment after this gate passes."
          } >> "$GITHUB_STEP_SUMMARY"

  apply:
    name: Terraform apply
    runs-on: ubuntu-latest
    needs: approve
    environment:
      name: terraform
    env:
      TF_IN_AUTOMATION: "true"
      TF_VAR_project_id: ${{ vars.GCP_PROJECT_ID }}
      TF_VAR_backup_bucket_name: ${{ vars.TF_VAR_BACKUP_BUCKET_NAME }}
      TF_VAR_ssh_source_ranges: ${{ vars.TF_VAR_SSH_SOURCE_RANGES }}
      TF_VAR_enable_github_iap_deploy: ${{ vars.TF_VAR_ENABLE_GITHUB_IAP_DEPLOY || 'false' }}
      TERRAFORM_STATE_BUCKET: ${{ vars.TERRAFORM_STATE_BUCKET }}
      TERRAFORM_STATE_PREFIX: ${{ vars.TERRAFORM_STATE_PREFIX }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate Terraform workflow configuration
        env:
          GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          GCP_TERRAFORM_SERVICE_ACCOUNT: ${{ secrets.GCP_TERRAFORM_SERVICE_ACCOUNT }}
        run: |
          set -euo pipefail

          for name in \
            TF_VAR_project_id \
            TF_VAR_backup_bucket_name \
            TF_VAR_ssh_source_ranges \
            TF_VAR_enable_github_iap_deploy \
            TERRAFORM_STATE_BUCKET \
            TERRAFORM_STATE_PREFIX \
            GCP_WORKLOAD_IDENTITY_PROVIDER \
            GCP_TERRAFORM_SERVICE_ACCOUNT
          do
            value="${!name:-}"
            if [ -z "$value" ]; then
              echo "::error::$name is required for Terraform apply"
              exit 1
            fi
          done

          python - <<'PY'
          import json
          import os
          import sys

          raw = os.environ["TF_VAR_ssh_source_ranges"]
          try:
              ranges = json.loads(raw)
          except json.JSONDecodeError as exc:
              print(f"::error::TF_VAR_SSH_SOURCE_RANGES must be a JSON list of CIDR strings: {exc}")
              sys.exit(1)

          if not isinstance(ranges, list) or not all(isinstance(item, str) for item in ranges):
              print("::error::TF_VAR_SSH_SOURCE_RANGES must be a JSON list of CIDR strings")
              sys.exit(1)

          if os.environ["TF_VAR_enable_github_iap_deploy"] not in ("true", "false"):
              print("::error::TF_VAR_ENABLE_GITHUB_IAP_DEPLOY must be true or false")
              sys.exit(1)
          PY

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_TERRAFORM_SERVICE_ACCOUNT }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.9.8"
          terraform_wrapper: false

      - name: Terraform format check
        working-directory: infra/gcp
        run: terraform fmt -check -recursive

      - name: Terraform init
        working-directory: infra/gcp
        run: |
          set -euo pipefail
          terraform init \
            -input=false \
            -backend-config="bucket=${TERRAFORM_STATE_BUCKET}" \
            -backend-config="prefix=${TERRAFORM_STATE_PREFIX}"

      - name: Terraform validate
        working-directory: infra/gcp
        run: terraform validate

      - name: Terraform plan for apply
        working-directory: infra/gcp
        run: |
          set -euo pipefail
          terraform plan \
            -input=false \
            -no-color \
            -out=tfplan \
            > terraform-apply-plan.log
          cat terraform-apply-plan.log
          terraform show -no-color tfplan > terraform-apply-plan.txt

          {
            echo "## Terraform Apply Plan"
            echo
            echo "- Project: \`${TF_VAR_project_id}\`"
            echo "- State bucket: \`${TERRAFORM_STATE_BUCKET}\`"
            echo "- State prefix: \`${TERRAFORM_STATE_PREFIX}\`"
            echo
            echo '```text'
            sed -n '1,400p' terraform-apply-plan.txt
            echo '```'
            if [ "$(wc -l < terraform-apply-plan.txt)" -gt 400 ]; then
              echo
              echo "Plan output was truncated in the summary. Download workflow logs for the full output."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Terraform apply
        working-directory: infra/gcp
        run: terraform apply -input=false -auto-approve tfplan
