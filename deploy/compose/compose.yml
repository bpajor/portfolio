name: ${COMPOSE_PROJECT_NAME:-portfolio}

services:
  caddy:
    image: caddy:2.8-alpine
    restart: unless-stopped
    depends_on:
      web:
        condition: service_started
      api:
        condition: service_started
      mcp:
        condition: service_started
    environment:
      SITE_ADDRESS: ${SITE_ADDRESS:-:80}
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - public
      - private

  web:
    image: ${COMPOSE_PROJECT_NAME:-portfolio}-web:latest
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-/api}
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-/api}
    expose:
      - "3000"
    networks:
      - private

  api:
    image: ${COMPOSE_PROJECT_NAME:-portfolio}-api:latest
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    environment:
      API_ADDR: :8080
      API_ALLOWED_ORIGINS: ${API_ALLOWED_ORIGINS}
      API_COOKIE_SECURE: ${API_COOKIE_SECURE:-true}
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      SESSION_SECRET: ${SESSION_SECRET}
      TURNSTILE_SECRET_KEY: ${TURNSTILE_SECRET_KEY}
      TURNSTILE_VERIFY_URL: ${TURNSTILE_VERIFY_URL:-https://challenges.cloudflare.com/turnstile/v0/siteverify}
    expose:
      - "8080"
    networks:
      - private

  mcp:
    image: ${COMPOSE_PROJECT_NAME:-portfolio}-mcp:latest
    build:
      context: ../..
      dockerfile: apps/mcp/Dockerfile
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    environment:
      MCP_ADDR: :8090
      MCP_BEARER_TOKEN: ${MCP_BEARER_TOKEN}
      MCP_ADMIN_BEARER_TOKEN: ${MCP_ADMIN_BEARER_TOKEN}
      MCP_ALLOWED_ORIGINS: ${MCP_ALLOWED_ORIGINS}
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
    expose:
      - "8090"
    networks:
      - private

  postgres:
    image: postgres:13
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 12
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - private

  migrate:
    image: postgres:13
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      PGPASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ../../db/migrations:/migrations:ro
    command:
      - sh
      - -ec
      - |
        if psql -h postgres -U "$$POSTGRES_USER" -d "$$POSTGRES_DB" -tAc "SELECT to_regclass('public.profile')" | grep -q profile; then
          echo "database schema already exists; skipping initial migration"
        else
          sed '/-- +goose Down/,$$d' /migrations/00001_initial_schema.sql | \
            psql -v ON_ERROR_STOP=1 -h postgres -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"
        fi
        psql -v ON_ERROR_STOP=1 -h postgres -U "$$POSTGRES_USER" -d "$$POSTGRES_DB" \
          -f /migrations/00002_seed_initial_posts.sql
    networks:
      - private

networks:
  public:
  private:

volumes:
  postgres-data:
  caddy-data:
  caddy-config:
